global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

accessLog:
  bufferingSize: 100

api:
  dashboard: true
  # 禁止通过不安全端口直接暴露 Dashboard。
  insecure: false

ping: {}

entryPoints:
  web:
    address: ":80"
    http:
      # 所有 HTTP 请求永久重定向到 HTTPS。
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      # websecure 入口的默认 TLS 配置。
      tls:
        certResolver: letsencrypt
        options: modern@file

providers:
  docker:
    # 通过 docker-socket-proxy 访问 Docker API，不直接挂载 docker.sock。
    endpoint: "tcp://docker-socket-proxy:2375"
    # 只有显式设置 traefik.enable=true 的容器才会被发布。
    exposedByDefault: false
    watch: true
  file:
    # 动态中间件和 TLS 选项目录。
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      # 保存 ACME 账号信息和已签发证书。
      storage: /letsencrypt/acme.json
      dnsChallenge:
        # 需要 Traefik 容器环境中存在 CLOUDFLARE_DNS_API_TOKEN。
        provider: cloudflare
        propagation:
          delayBeforeChecks: 30
