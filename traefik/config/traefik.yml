global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO

accessLog:
  format: json
  bufferingSize: 100
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        Cf-Connecting-Ip: keep
        X-Forwarded-For: keep
        X-Forwarded-Proto: keep
        X-Real-Ip: keep
        Cf-Ray: keep

api:
  dashboard: true
  # 禁止通过不安全端口直接暴露控制台。
  insecure: false

ping: {}

entryPoints:
  web:
    address: ":80"
    forwardedHeaders:
      # 只信任 Cloudflare 边缘节点转发的 X-Forwarded-* 头，避免源站直连伪造访客 IP。
      # Cloudflare 官方 IP 段最后核对日期：2026-07-07。
      trustedIPs: &cloudflareTrustedIPs
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 108.162.192.0/18
        - 131.0.72.0/22
        - 141.101.64.0/18
        - 162.158.0.0/15
        - 172.64.0.0/13
        - 173.245.48.0/20
        - 188.114.96.0/20
        - 190.93.240.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 2400:cb00::/32
        - 2606:4700::/32
        - 2803:f800::/32
        - 2405:b500::/32
        - 2405:8100::/32
        - 2a06:98c0::/29
        - 2c0f:f248::/32
    http:
      # 所有 HTTP 请求永久重定向到 HTTPS。
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    forwardedHeaders:
      trustedIPs: *cloudflareTrustedIPs
    http:
      # websecure 入口默认启用 Let's Encrypt 证书和文件配置提供者中的 TLS 策略。
      tls:
        certResolver: letsencrypt
        options: modern@file

providers:
  docker:
    # 通过 docker-socket-proxy 访问 Docker API，不直接挂载 docker.sock。
    endpoint: "tcp://docker-socket-proxy:2375"
    # 只有显式设置 traefik.enable=true 的容器才会被发布。
    exposedByDefault: false
    watch: true
  file:
    # 动态中间件和 TLS 策略目录。
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      # email 和 caServer 由 compose.yml 的命令行参数从 .env 注入。
      # 模板默认使用 Let's Encrypt staging；生产签发前请在 .env 切换 ACME_CA_SERVER。
      # 保存 ACME 账号信息和已签发证书。
      storage: /letsencrypt/acme.json
      dnsChallenge:
        # 需要 Traefik 容器环境中存在 CLOUDFLARE_DNS_API_TOKEN。
        provider: cloudflare
        propagation:
          delayBeforeChecks: 30
