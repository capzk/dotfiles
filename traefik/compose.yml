name: ${COMPOSE_PROJECT_NAME:-traefik}

networks:
  proxy:
    external: true
    name: ${TRAEFIK_DOCKER_NETWORK:-proxy}
  socket_proxy:
    internal: true

services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:${DOCKER_SOCKET_PROXY_TAG:-0.3.0}
    restart: unless-stopped
    privileged: true
    environment:
      CONTAINERS: 1
      EVENTS: 1
      INFO: 1
      NETWORKS: 1
      PING: 1
      SERVICES: 1
      TASKS: 1
      VERSION: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket_proxy

  traefik:
    image: traefik:${TRAEFIK_IMAGE_TAG:-v3.7}
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    environment:
      TZ: ${TZ:-UTC}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN:?Set CLOUDFLARE_DNS_API_TOKEN in .env}
    command:
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --entrypoints.web.forwardedHeaders.trustedIPs=${TRAEFIK_CLOUDFLARE_SOURCE_RANGES}
      - --entrypoints.websecure.forwardedHeaders.trustedIPs=${TRAEFIK_CLOUDFLARE_SOURCE_RANGES}
      - --entrypoints.websecure.http.tls.domains[0].main=${TRAEFIK_ACME_DOMAIN_MAIN}
      - --entrypoints.websecure.http.tls.domains[0].sans=${TRAEFIK_ACME_DOMAIN_SANS}
      - --providers.docker.network=${TRAEFIK_DOCKER_NETWORK:-proxy}
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/dynamic:/etc/traefik/dynamic:ro
      - ./data/letsencrypt:/letsencrypt
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-proxy}
      - traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik-dashboard.entrypoints=websecure
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik-dashboard.middlewares=cloudflare-only,default-security-headers@file
      - traefik.http.middlewares.cloudflare-only.ipallowlist.sourcerange=${TRAEFIK_CLOUDFLARE_SOURCE_RANGES}
    healthcheck:
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - proxy
      - socket_proxy
