name: traefik

networks:
  # 用户手动创建的公共业务网络。
  # Traefik 和需要反代的业务容器都要加入这个网络。
  app_proxy:
    external: true
    name: ${APP_PROXY_NETWORK:?请在 .env 设置 APP_PROXY_NETWORK}

services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    env_file:
      # 提供 Cloudflare 令牌、域名、邮箱和控制台凭据等部署参数。
      - .env
    command:
      # 从 .env 读取证书邮箱，避免模板示例值被误用于生产。
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?请在 .env 设置 ACME_EMAIL}
      # 默认使用 Let's Encrypt staging，调试通过后在 .env 改为生产 CA，避免反复部署触发正式环境限流。
      - --certificatesresolvers.letsencrypt.acme.caserver=${ACME_CA_SERVER:-https://acme-staging-v02.api.letsencrypt.org/directory}
      # 必须和 app_proxy 外部网络名、业务服务 traefik.docker.network 保持一致。
      - --providers.docker.network=${APP_PROXY_NETWORK:?请在 .env 设置 APP_PROXY_NETWORK}
    ports:
      # 生产环境公网 HTTP/HTTPS 入口，通常固定使用 80/443。
      - "80:80"
      - "443:443"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # 允许 Docker Provider 读取本机容器 labels；只读挂载，不发布 Docker API 端口。
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/dynamic:/etc/traefik/dynamic:ro
      # 保存 Let's Encrypt 账号、证书和私钥，文件权限必须严格限制。
      - ./data/letsencrypt:/letsencrypt
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=${APP_PROXY_NETWORK:?请在 .env 设置 APP_PROXY_NETWORK}
      # 控制台路由默认使用基础认证；建议叠加 Cloudflare Access、WAF 或源站防火墙。
      - traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST:?请在 .env 设置 TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik-dashboard.entrypoints=websecure
      - traefik.http.routers.traefik-dashboard.service=api@internal
      - traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt
      # 显式在一个固定存在的路由上声明证书域名，确保启动后申请根域名和通配符证书。
      - traefik.http.routers.traefik-dashboard.tls.domains[0].main=${DOMAIN:?请在 .env 设置 DOMAIN}
      - traefik.http.routers.traefik-dashboard.tls.domains[0].sans=*.${DOMAIN:?请在 .env 设置 DOMAIN}
      - traefik.http.routers.traefik-dashboard.middlewares=traefik-dashboard-auth,default-security-headers@file
      - traefik.http.middlewares.traefik-dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:?请在 .env 设置 TRAEFIK_DASHBOARD_AUTH}
    healthcheck:
      test:
        - CMD
        - traefik
        - healthcheck
        - --ping
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app_proxy
